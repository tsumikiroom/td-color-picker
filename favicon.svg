<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 角丸正方形の背景 -->
  <rect width="64" height="64" rx="14" fill="#14161c"/>

  <!-- カラーホイール: 12 色のセクター -->
  <g transform="translate(32 32)">
    <!-- ホイール本体: conic-gradient 風に円弧で12分割 -->
    <g>
      <!-- 各セクター(30度ずつ、外側 半径 20、中央に穴) -->
      <!-- 0°: red, 30°: orange, 60°: yellow, 90°: yellow-green, 120°: green,
           150°: teal, 180°: cyan, 210°: blue, 240°: indigo, 270°: violet,
           300°: magenta, 330°: pink -->
      <path d="M 0 -22 A 22 22 0 0 1 11 -19.05 L 5.5 -9.53 A 11 11 0 0 0 0 -11 Z" fill="#ff4040"/>
      <path d="M 11 -19.05 A 22 22 0 0 1 19.05 -11 L 9.53 -5.5 A 11 11 0 0 0 5.5 -9.53 Z" fill="#ff8c1a"/>
      <path d="M 19.05 -11 A 22 22 0 0 1 22 0 L 11 0 A 11 11 0 0 0 9.53 -5.5 Z" fill="#ffd60a"/>
      <path d="M 22 0 A 22 22 0 0 1 19.05 11 L 9.53 5.5 A 11 11 0 0 0 11 0 Z" fill="#9ae600"/>
      <path d="M 19.05 11 A 22 22 0 0 1 11 19.05 L 5.5 9.53 A 11 11 0 0 0 9.53 5.5 Z" fill="#33d17a"/>
      <path d="M 11 19.05 A 22 22 0 0 1 0 22 L 0 11 A 11 11 0 0 0 5.5 9.53 Z" fill="#1aa3a3"/>
      <path d="M 0 22 A 22 22 0 0 1 -11 19.05 L -5.5 9.53 A 11 11 0 0 0 0 11 Z" fill="#2ec4ff"/>
      <path d="M -11 19.05 A 22 22 0 0 1 -19.05 11 L -9.53 5.5 A 11 11 0 0 0 -5.5 9.53 Z" fill="#1f6feb"/>
      <path d="M -19.05 11 A 22 22 0 0 1 -22 0 L -11 0 A 11 11 0 0 0 -9.53 5.5 Z" fill="#6d3df0"/>
      <path d="M -22 0 A 22 22 0 0 1 -19.05 -11 L -9.53 -5.5 A 11 11 0 0 0 -11 0 Z" fill="#a04bff"/>
      <path d="M -19.05 -11 A 22 22 0 0 1 -11 -19.05 L -5.5 -9.53 A 11 11 0 0 0 -9.53 -5.5 Z" fill="#e833c4"/>
      <path d="M -11 -19.05 A 22 22 0 0 1 0 -22 L 0 -11 A 11 11 0 0 0 -5.5 -9.53 Z" fill="#ff4d8d"/>
    </g>

    <!-- 中央の白いノブ(ピッカーの目印) -->
    <circle cx="0" cy="0" r="6" fill="#ffffff" stroke="#14161c" stroke-width="1.5"/>
  </g>
</svg>
