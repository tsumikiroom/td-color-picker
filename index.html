<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color Picker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#14161c;color:#e7e9ee;margin:0;padding:20px;}
  .wrap{max-width:440px;margin:0 auto;}
  h1{font-size:16px;font-weight:600;margin:0 0 14px;}

  #sv{position:relative;width:100%;height:200px;border-radius:8px;cursor:crosshair;
      background:linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,transparent);
      background-color:#f00;touch-action:none;}
  #svKnob{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;
      box-shadow:0 0 0 1px rgba(0,0,0,.5);transform:translate(-50%,-50%);pointer-events:none;}
  #hue{width:100%;height:18px;margin-top:12px;border-radius:9px;-webkit-appearance:none;appearance:none;
      background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);outline:none;touch-action:none;}
  #hue::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:22px;border-radius:4px;background:#fff;
      border:1px solid #333;cursor:pointer;}

  .cur{display:flex;align-items:center;gap:12px;margin:16px 0 8px;}
  #swatch{width:64px;height:64px;border-radius:8px;border:1px solid #333;flex:0 0 auto;}
  .btns{display:flex;gap:8px;flex-wrap:wrap;}
  button{font:inherit;font-size:13px;padding:8px 12px;border-radius:7px;border:1px solid #333;
      background:#222630;color:#e7e9ee;cursor:pointer;}
  button:hover{background:#2c3140;}
  button.primary{background:#1f6feb;border-color:#1f6feb;}

  table{width:100%;border-collapse:collapse;margin-top:8px;font-variant-numeric:tabular-nums;}
  td{padding:7px 8px;border-bottom:1px solid #232733;font-size:13px;vertical-align:middle;}
  td.k{color:#8a90a0;width:120px;}
  td.v{font-family:ui-monospace,Consolas,monospace;color:#e7e9ee;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:6px;
        background:#1c2029;border:1px solid #2a2f3a;cursor:pointer;user-select:none;
        font-family:ui-monospace,Consolas,monospace;color:#e7e9ee;font-size:12px;line-height:1.2;
        transition:background .15s,border-color .15s,color .15s;}
  .chip:hover{background:#252a36;border-color:#3a4150;color:#7cc4ff;}
  .chip:active{background:#2c3140;}
  .chip::after{content:'⧉';font-size:10px;color:#555;}
  .chip.copied{background:#1a3a26;border-color:#33d17a;color:#33d17a;}
  .chip.copied::after{content:'✓';color:#33d17a;}

  #drop{margin-top:14px;border:1px dashed #3a3f4b;border-radius:8px;padding:10px;text-align:center;
      font-size:12px;color:#8a90a0;}
  #imgcv{max-width:100%;display:none;margin-top:8px;border-radius:6px;cursor:crosshair;}

  .pal{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .pal .sw{width:30px;height:30px;border-radius:6px;border:1px solid #333;cursor:pointer;}
  .label{font-size:11px;color:#8a90a0;margin:18px 0 4px;text-transform:uppercase;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Color Picker</h1>

  <div id="sv"><div id="svKnob"></div></div>
  <input type="range" id="hue" min="0" max="1" step="0.0001" value="0">

  <div class="cur">
    <div id="swatch"></div>
    <div class="btns">
      <button class="primary" id="eyedrop">画面スポイト</button>
      <button id="save">パレット保存</button>
      <button id="clear">クリア</button>
    </div>
  </div>

  <table id="out"></table>

  <div class="label">画像からスポイト(貼り付け / ドロップ → クリックで吸う)</div>
  <div id="drop">ここに画像をドロップ、または Ctrl+V で貼り付け</div>
  <canvas id="imgcv"></canvas>

  <div class="label">パレット</div>
  <div class="pal" id="pal"></div>
</div>

<script>
// ---------- color math (all inputs/outputs 0..1) ----------
function hsv2rgb(h,s,v){
  let i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s), r,g,b;
  switch(i%6){
    case 0:r=v;g=t;b=p;break; case 1:r=q;g=v;b=p;break; case 2:r=p;g=v;b=t;break;
    case 3:r=p;g=q;b=v;break; case 4:r=t;g=p;b=v;break; case 5:r=v;g=p;b=q;break;
  }
  return [r,g,b];
}
function rgb2hsv(r,g,b){
  let mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h/=6; if(h<0)h+=1; }
  return [h, mx?d/mx:0, mx];
}
const hex=(r,g,b)=>'#'+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');

// ---------- state & UI ----------
let H=0,S=1,V=1;
const sv=document.getElementById('sv'), knob=document.getElementById('svKnob');
const hue=document.getElementById('hue'), swatch=document.getElementById('swatch'), out=document.getElementById('out');

function render(){
  const [r,g,b]=hsv2rgb(H,S,V), [hr,hg,hb]=hsv2rgb(H,1,1);
  sv.style.backgroundColor='rgb('+(hr*255|0)+','+(hg*255|0)+','+(hb*255|0)+')';
  knob.style.left=(S*100)+'%'; knob.style.top=((1-V)*100)+'%';
  swatch.style.background='rgb('+(r*255|0)+','+(g*255|0)+','+(b*255|0)+')';

  const f3=x=>x.toFixed(3);
  // 各行: [label, [(表示文字列, コピーされる文字列), ...]]
  const rows=[
    ['HEX', [
      [hex(r,g,b), hex(r,g,b)],
    ]],
    ['RGB 0-255', [
      [String(Math.round(r*255)), String(Math.round(r*255))],
      [String(Math.round(g*255)), String(Math.round(g*255))],
      [String(Math.round(b*255)), String(Math.round(b*255))],
    ]],
    ['RGB 0-1', [
      [f3(r), f3(r)],
      [f3(g), f3(g)],
      [f3(b), f3(b)],
    ]],
    ['HSV 度/%', [
      [Math.round(H*360)+'°', String(Math.round(H*360))],
      [Math.round(S*100)+'%', String(Math.round(S*100))],
      [Math.round(V*100)+'%', String(Math.round(V*100))],
    ]],
    ['HSV 0-1 (TD)', [
      [f3(H), f3(H)],
      [f3(S), f3(S)],
      [f3(V), f3(V)],
    ]],
  ];
  out.innerHTML = rows.map(([k, chips])=>{
    const cells = chips.map(([label, copy])=>
      `<span class="chip" data-copy="${copy}">${label}</span>`
    ).join('');
    return `<tr><td class="k">${k}</td><td class="v"><div class="chips">${cells}</div></td></tr>`;
  }).join('');
}
function setHSV(h,s,v){H=h;S=s;V=v;hue.value=h;render();}
function setRGB(r,g,b){const [h,s,v]=rgb2hsv(r,g,b);setHSV(h,s,v);}

// copy on chip click
out.addEventListener('click',e=>{
  const chip=e.target.closest('.chip'); if(!chip) return;
  navigator.clipboard?.writeText(chip.dataset.copy).then(()=>{
    chip.classList.add('copied'); setTimeout(()=>chip.classList.remove('copied'),700);
  });
});

// SV square drag
function svPick(e){
  const r=sv.getBoundingClientRect();
  S=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  V=1-Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
  render();
}
sv.addEventListener('pointerdown',e=>{sv.setPointerCapture(e.pointerId);svPick(e);});
sv.addEventListener('pointermove',e=>{if(e.buttons)svPick(e);});
hue.addEventListener('input',()=>{H=+hue.value;render();});

// ---------- palette (localStorage) ----------
const palEl=document.getElementById('pal');
let pal=JSON.parse(localStorage.getItem('td_pal')||'[]');
function renderPal(){
  palEl.innerHTML='';
  pal.forEach((c,i)=>{
    const d=document.createElement('div');d.className='sw';d.style.background=c;d.title=c+'  (右クリックで削除)';
    d.onclick=()=>{const r=parseInt(c.substr(1,2),16)/255,g=parseInt(c.substr(3,2),16)/255,b=parseInt(c.substr(5,2),16)/255;setRGB(r,g,b);};
    d.oncontextmenu=e=>{e.preventDefault();pal.splice(i,1);localStorage.setItem('td_pal',JSON.stringify(pal));renderPal();};
    palEl.appendChild(d);
  });
}
renderPal();
function addPal(){const [r,g,b]=hsv2rgb(H,S,V);pal.push(hex(r,g,b));localStorage.setItem('td_pal',JSON.stringify(pal));renderPal();}
document.getElementById('save').onclick=addPal;
document.getElementById('clear').onclick=()=>{pal=[];localStorage.removeItem('td_pal');renderPal();};

// ---------- screen eyedropper (whole desktop, Chrome/Edge) ----------
const eyeBtn=document.getElementById('eyedrop');
if(window.EyeDropper){
  eyeBtn.onclick=async()=>{
    try{
      const {sRGBHex:h}=await new EyeDropper().open();
      setRGB(parseInt(h.substr(1,2),16)/255,parseInt(h.substr(3,2),16)/255,parseInt(h.substr(5,2),16)/255);
      addPal();
    }catch(_){}
  };
}else{ eyeBtn.disabled=true; eyeBtn.textContent='画面スポイト(非対応)'; }

// ---------- image eyedropper ----------
const cv=document.getElementById('imgcv'), ctx=cv.getContext('2d'), drop=document.getElementById('drop');
function loadImg(src){
  const im=new Image();
  im.onload=()=>{const w=Math.min(400,im.width);cv.width=w;cv.height=im.height*w/im.width;
    ctx.drawImage(im,0,0,cv.width,cv.height);cv.style.display='block';};
  im.src=src;
}
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  const p=ctx.getImageData((e.clientX-r.left)*cv.width/r.width,(e.clientY-r.top)*cv.height/r.height,1,1).data;
  setRGB(p[0]/255,p[1]/255,p[2]/255); addPal();
});
window.addEventListener('paste',e=>{for(const it of e.clipboardData.items){if(it.type.startsWith('image')){loadImg(URL.createObjectURL(it.getAsFile()));}}});
drop.addEventListener('dragover',e=>e.preventDefault());
drop.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadImg(URL.createObjectURL(f));});

// init
setHSV(0.583,0.8,1.0);
</script>
</body>
</html>
