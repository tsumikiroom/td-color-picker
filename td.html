<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TD Color Picker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#14161c;color:#e7e9ee;margin:0;padding:20px;}
  .wrap{max-width:440px;margin:0 auto;}
  h1{font-size:16px;font-weight:600;margin:0 0 4px;}
  .status{font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:#aab0bd;}
  .dot{width:9px;height:9px;border-radius:50%;background:#888;}
  .dot.on{background:#33d17a;} .dot.off{background:#e0455e;}

  #sv{position:relative;width:100%;height:200px;border-radius:8px;cursor:crosshair;
      background:linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,transparent);
      background-color:#f00;touch-action:none;}
  #svKnob{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;
      box-shadow:0 0 0 1px rgba(0,0,0,.5);transform:translate(-50%,-50%);pointer-events:none;}
  #hue{width:100%;height:18px;margin-top:12px;border-radius:9px;-webkit-appearance:none;appearance:none;
      background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);outline:none;touch-action:none;}
  #hue::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:22px;border-radius:4px;background:#fff;
      border:1px solid #333;cursor:pointer;}

  .cur{display:flex;align-items:center;gap:12px;margin:16px 0;}
  #swatch{width:54px;height:54px;border-radius:8px;border:1px solid #333;flex:0 0 auto;}
  .read{font-size:12px;font-variant-numeric:tabular-nums;line-height:1.5;color:#aab0bd;}
  .read b{color:#e7e9ee;}

  .btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  button{font:inherit;font-size:13px;padding:8px 12px;border-radius:7px;border:1px solid #333;
      background:#222630;color:#e7e9ee;cursor:pointer;}
  button:hover{background:#2c3140;}
  button.primary{background:#1f6feb;border-color:#1f6feb;}

  #drop{margin-top:6px;border:1px dashed #3a3f4b;border-radius:8px;padding:10px;text-align:center;
      font-size:12px;color:#8a90a0;}
  #imgcv{max-width:100%;display:none;margin-top:8px;border-radius:6px;cursor:crosshair;}

  .pal{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
  .pal .sw{width:30px;height:30px;border-radius:6px;border:1px solid #333;cursor:pointer;}
  .label{font-size:11px;color:#8a90a0;margin:16px 0 4px;text-transform:uppercase;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="wrap">
  <h1>TouchDesigner Color Picker</h1>
  <div class="status"><span id="dot" class="dot"></span><span id="stat">接続中…</span></div>

  <div id="sv"><div id="svKnob"></div></div>
  <input type="range" id="hue" min="0" max="1" step="0.0001" value="0">

  <div class="cur">
    <div id="swatch"></div>
    <div class="read" id="read"></div>
  </div>

  <div class="btns">
    <button class="primary" id="save">パレットに保存</button>
    <button id="eyedrop">画面スポイト</button>
    <button id="clear">クリア</button>
  </div>

  <div class="label">画像からスポイト(貼り付け / ドロップ → クリックで吸う)</div>
  <div id="drop">ここに画像をドロップ、または Ctrl+V で貼り付け</div>
  <canvas id="imgcv"></canvas>

  <div class="label">パレット</div>
  <div class="pal" id="pal"></div>
</div>

<script>
// ---------- WebSocket ----------
const dot=document.getElementById('dot'), stat=document.getElementById('stat');
let ws;
function connect(){
  ws=new WebSocket('ws://'+location.host);
  ws.onopen =()=>{dot.className='dot on'; stat.textContent='接続済み ('+location.host+')';};
  ws.onclose=()=>{dot.className='dot off';stat.textContent='切断。再接続中…';setTimeout(connect,1000);};
  ws.onerror=()=>{dot.className='dot off';stat.textContent='接続エラー';};
}
connect();
function send(obj){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

// ---------- color math (all 0..1) ----------
function hsv2rgb(h,s,v){
  let i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  let r,g,b;
  switch(i%6){
    case 0:r=v;g=t;b=p;break; case 1:r=q;g=v;b=p;break; case 2:r=p;g=v;b=t;break;
    case 3:r=p;g=q;b=v;break; case 4:r=t;g=p;b=v;break; case 5:r=v;g=p;b=q;break;
  }
  return [r,g,b];
}
function rgb2hsv(r,g,b){
  let mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h/=6; if(h<0)h+=1; }
  return [h, mx?d/mx:0, mx];
}
const hex=(r,g,b)=>'#'+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');

// ---------- state & UI ----------
let H=0,S=1,V=1;
const sv=document.getElementById('sv'), knob=document.getElementById('svKnob');
const hue=document.getElementById('hue'), swatch=document.getElementById('swatch'), read=document.getElementById('read');

function render(live=true){
  const [r,g,b]=hsv2rgb(H,S,V);
  const [hr,hg,hb]=hsv2rgb(H,1,1);
  sv.style.backgroundColor='rgb('+(hr*255|0)+','+(hg*255|0)+','+(hb*255|0)+')';
  knob.style.left=(S*100)+'%'; knob.style.top=((1-V)*100)+'%';
  const c='rgb('+(r*255|0)+','+(g*255|0)+','+(b*255|0)+')';
  swatch.style.background=c;
  read.innerHTML='<b>'+hex(r,g,b)+'</b><br>RGB '+r.toFixed(3)+' '+g.toFixed(3)+' '+b.toFixed(3)+
                 '<br>HSV '+H.toFixed(3)+' '+S.toFixed(3)+' '+V.toFixed(3);
  if(live) send({action:'set',r,g,b});
}
function setHSV(h,s,v,live=true){H=h;S=s;V=v;hue.value=h;render(live);}
function setRGB(r,g,b,live=true){const [h,s,v]=rgb2hsv(r,g,b);setHSV(h,s,v,live);}

// SV square drag
function svPick(e){
  const rect=sv.getBoundingClientRect();
  const x=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));
  const y=Math.min(1,Math.max(0,(e.clientY-rect.top)/rect.height));
  S=x; V=1-y; render();
}
sv.addEventListener('pointerdown',e=>{sv.setPointerCapture(e.pointerId);svPick(e);});
sv.addEventListener('pointermove',e=>{if(e.buttons)svPick(e);});
hue.addEventListener('input',()=>{H=+hue.value;render();});

// ---------- palette (localStorage mirror) ----------
const palEl=document.getElementById('pal');
let pal=JSON.parse(localStorage.getItem('td_pal')||'[]');
function renderPal(){
  palEl.innerHTML='';
  pal.forEach(c=>{
    const d=document.createElement('div');d.className='sw';d.style.background=c;d.title=c;
    d.onclick=()=>{const r=parseInt(c.substr(1,2),16)/255,g=parseInt(c.substr(3,2),16)/255,b=parseInt(c.substr(5,2),16)/255;setRGB(r,g,b);};
    palEl.appendChild(d);
  });
}
renderPal();
function savePal(){
  const [r,g,b]=hsv2rgb(H,S,V);
  pal.push(hex(r,g,b));
  localStorage.setItem('td_pal',JSON.stringify(pal));
  renderPal();
  send({action:'save',r,g,b});   // append to TD palette table
}
document.getElementById('save').onclick=savePal;
document.getElementById('clear').onclick=()=>{pal=[];localStorage.removeItem('td_pal');renderPal();send({action:'clear'});};

// ---------- screen eyedropper (whole desktop, Chrome/Edge) ----------
const eyeBtn=document.getElementById('eyedrop');
if(window.EyeDropper){
  eyeBtn.onclick=async()=>{
    try{
      const res=await new EyeDropper().open();
      const h=res.sRGBHex;
      const r=parseInt(h.substr(1,2),16)/255,g=parseInt(h.substr(3,2),16)/255,b=parseInt(h.substr(5,2),16)/255;
      setRGB(r,g,b,false); pal.push(hex(r,g,b)); localStorage.setItem('td_pal',JSON.stringify(pal)); renderPal();
      send({action:'save',r,g,b});
    }catch(_){}
  };
}else{ eyeBtn.disabled=true; eyeBtn.textContent='画面スポイト(非対応)'; }

// ---------- image eyedropper ----------
const cv=document.getElementById('imgcv'), ctx=cv.getContext('2d'), drop=document.getElementById('drop');
function loadImg(src){
  const im=new Image();
  im.onload=()=>{const w=Math.min(400,im.width);cv.width=w;cv.height=im.height*w/im.width;
    ctx.drawImage(im,0,0,cv.width,cv.height);cv.style.display='block';};
  im.src=src;
}
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX-rect.left)*cv.width/rect.width, y=(e.clientY-rect.top)*cv.height/rect.height;
  const p=ctx.getImageData(x,y,1,1).data;
  const r=p[0]/255,g=p[1]/255,b=p[2]/255;
  setRGB(r,g,b,false); pal.push(hex(r,g,b)); localStorage.setItem('td_pal',JSON.stringify(pal)); renderPal();
  send({action:'save',r,g,b});
});
window.addEventListener('paste',e=>{
  for(const it of e.clipboardData.items){
    if(it.type.startsWith('image')){const f=it.getAsFile();loadImg(URL.createObjectURL(f));}
  }
});
drop.addEventListener('dragover',e=>e.preventDefault());
drop.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)loadImg(URL.createObjectURL(f));});

// init
setHSV(0.583,0.8,1.0,true);
</script>
</body>
</html>
